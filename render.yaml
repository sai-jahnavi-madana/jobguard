services:
  - type: web
    name: jobguard-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        value: admin@jobguard.app
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./jobguard.db

  - type: web
    name: jobguard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
